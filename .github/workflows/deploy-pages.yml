name: Deploy game to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - run: |
          mkdir -p _site/assets
          cp site/index.html _site/index.html
          cp site/assets/index-D3GIaxyI.css _site/assets/
          touch _site/.nojekyll
          cat site/parts/index-CbGlcNPD.js.gz.part-* > /tmp/game-bundle.js.gz
          gzip -dc /tmp/game-bundle.js.gz > _site/assets/index-CbGlcNPD.js
          test "$(wc -c < _site/assets/index-CbGlcNPD.js)" -eq 1629085
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
