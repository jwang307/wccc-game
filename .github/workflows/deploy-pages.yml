name: Deploy game to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out compiled game
        uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Assemble site
        run: |
          mkdir -p _site/assets
          cp site/index.html _site/index.html
          cp site/assets/index-DZ9bBuFe.css _site/assets/
          touch _site/.nojekyll
          cat site/parts/index-CLe3AxvC.js.part-* > _site/assets/index-CLe3AxvC.js
          test "$(wc -c < _site/assets/index-CLe3AxvC.js)" -eq 1626915
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
